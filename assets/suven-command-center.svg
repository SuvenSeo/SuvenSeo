<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Suven Seoras command center banner</title>
  <desc id="desc">A dark technical dashboard banner for Suven Seoras and Ardeno Studio showing web, intelligence, automation, and AI product systems.</desc>
  <style>
    .mono { font-family: "SFMono-Regular", "Cascadia Mono", "Consolas", monospace; }
    .sans { font-family: "Inter", "Segoe UI", Arial, sans-serif; }
    .tiny { font-size: 13px; }
    .small { font-size: 16px; }
    .label { font-size: 18px; font-weight: 700; }
    .title { font-size: 58px; font-weight: 800; }
    .sub { font-size: 22px; font-weight: 600; }
    .muted { fill: #94a3b8; }
    .white { fill: #f8fafc; }
    .cyan { fill: #38bdf8; }
    .green { fill: #34d399; }
    .amber { fill: #f59e0b; }
    .red { fill: #fb7185; }
    .panel { fill: rgba(15, 23, 42, 0.82); stroke: rgba(148, 163, 184, 0.28); stroke-width: 1; }
    .panel-strong { fill: rgba(2, 6, 23, 0.92); stroke: rgba(56, 189, 248, 0.55); stroke-width: 1.2; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".42" stop-color="#07111f"/>
      <stop offset=".73" stop-color="#111827"/>
      <stop offset="1" stop-color="#2a0f16"/>
    </linearGradient>
    <linearGradient id="accent" x1="100" y1="30" x2="1110" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset=".45" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <path d="M58 88H1138" stroke="url(#accent)" stroke-width="2" opacity=".78"/>

  <g transform="translate(54 34)">
    <rect class="panel" width="1092" height="44" rx="14"/>
    <circle cx="24" cy="22" r="6" fill="#fb7185"/>
    <circle cx="46" cy="22" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="22" r="6" fill="#34d399"/>
    <text x="96" y="28" class="mono tiny muted">SUVEN-SEORAS / ARDENO-STUDIO / BUILD-OPS</text>
    <text x="872" y="28" class="mono tiny cyan">STATUS: SHIPPING</text>
  </g>

  <g transform="translate(70 112)">
    <rect class="panel-strong" width="560" height="188" rx="22"/>
    <text x="30" y="56" class="sans title white">Suven Seoras</text>
    <text x="34" y="92" class="mono sub cyan">AI + DATA PRODUCT BUILDER</text>
    <text x="34" y="124" class="mono small muted">Co-founder at Ardeno Studio</text>
    <text x="34" y="154" class="mono small muted">Premium websites, Sri Lanka market intelligence,</text>
    <text x="34" y="180" class="mono small muted">automation systems, and AI-enabled products.</text>
  </g>

  <g transform="translate(690 110)">
    <rect class="panel" width="430" height="214" rx="22"/>
    <text x="28" y="44" class="mono label white">OPERATING LANES</text>
    <g transform="translate(28 68)">
      <rect width="176" height="42" rx="12" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.46)"/>
      <text x="18" y="27" class="mono small cyan">WEB STUDIO</text>
    </g>
    <g transform="translate(226 68)">
      <rect width="176" height="42" rx="12" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.46)"/>
      <text x="18" y="27" class="mono small green">DATA PRODUCTS</text>
    </g>
    <g transform="translate(28 126)">
      <rect width="176" height="42" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.48)"/>
      <text x="18" y="27" class="mono small amber">AUTOMATION</text>
    </g>
    <g transform="translate(226 126)">
      <rect width="176" height="42" rx="12" fill="rgba(251,113,133,0.12)" stroke="rgba(251,113,133,0.48)"/>
      <text x="18" y="27" class="mono small red">AI SYSTEMS</text>
    </g>
  </g>

  <g transform="translate(95 334)">
    <rect class="panel" width="1010" height="56" rx="18"/>
    <text x="28" y="35" class="mono small muted">LIVE SYSTEMS</text>
    <text x="166" y="35" class="mono small white">OCTANE</text>
    <text x="304" y="35" class="mono small white">PROPERTYLK</text>
    <text x="472" y="35" class="mono small white">AUTOLENS</text>
    <text x="622" y="35" class="mono small white">FOODLK</text>
    <text x="750" y="35" class="mono small white">SEYLAN HUB</text>
    <text x="918" y="35" class="mono small white">SEOS</text>
  </g>
</svg>
