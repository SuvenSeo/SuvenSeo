<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Product constellation</title>
  <desc id="desc">A product map for Suven Seoras showing Ardeno Studio connected to market intelligence, AI systems, web studio, and developer tools.</desc>
  <style>
    .sans { font-family: "Inter", "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", "Cascadia Mono", "Consolas", monospace; }
    .kicker { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
    .title { font-size: 42px; font-weight: 800; }
    .node { font-size: 18px; font-weight: 800; }
    .tiny { font-size: 13px; }
    .small { font-size: 15px; }
    .white { fill: #f8fafc; }
    .muted { fill: #94a3b8; }
    .blue { fill: #38bdf8; }
    .green { fill: #34d399; }
    .amber { fill: #f59e0b; }
    .rose { fill: #fb7185; }
    .panel { fill: rgba(15, 23, 42, 0.82); stroke: rgba(148, 163, 184, 0.24); stroke-width: 1; }
    .hub { fill: rgba(2, 6, 23, 0.92); stroke: rgba(56, 189, 248, 0.7); stroke-width: 1.4; }
    .edge-blue { stroke: rgba(56, 189, 248, 0.45); stroke-width: 1.3; }
    .edge-green { stroke: rgba(52, 211, 153, 0.42); stroke-width: 1.3; }
    .edge-amber { stroke: rgba(245, 158, 11, 0.42); stroke-width: 1.3; }
    .edge-rose { stroke: rgba(251, 113, 133, 0.42); stroke-width: 1.3; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset=".5" stop-color="#061421"/>
      <stop offset="1" stop-color="#150b18"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 332) rotate(90) scale(260 420)">
      <stop stop-color="#38bdf8" stop-opacity=".22"/>
      <stop offset=".54" stop-color="#34d399" stop-opacity=".08"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="rgba(148,163,184,0.065)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="640" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="640" rx="30" fill="url(#glow)"/>
  <rect width="1200" height="640" rx="30" fill="url(#grid)"/>
  <text x="76" y="66" class="mono kicker green">PRODUCT NETWORK / LIVE SYSTEMS</text>
  <text x="76" y="122" class="sans title white">A local market software network, not isolated demos</text>
  <text x="78" y="156" class="sans small muted">The projects connect around Sri Lankan data, web execution, automation, and AI-enabled workflows.</text>

  <path d="M600 310L238 228" class="edge-blue"/>
  <path d="M600 310L250 430" class="edge-green"/>
  <path d="M600 310L950 222" class="edge-amber"/>
  <path d="M600 310L944 430" class="edge-rose"/>
  <path d="M600 310L600 520" class="edge-blue"/>
  <path d="M600 310L600 112" class="edge-green"/>

  <g transform="translate(456 238)">
    <rect class="hub" width="288" height="144" rx="28"/>
    <text x="54" y="58" class="sans node white">Ardeno Studio</text>
    <text x="42" y="92" class="mono small blue">WEB + AI + DATA PRODUCTS</text>
    <text x="68" y="120" class="mono tiny muted">co-founder at Ardeno Studio</text>
  </g>

  <g transform="translate(82 178)">
    <rect class="panel" width="312" height="102" rx="20"/>
    <text x="28" y="38" class="sans node blue">Web Studio</text>
    <text x="28" y="66" class="mono tiny muted">Cafe / Fitness / Automotive</text>
    <text x="28" y="86" class="mono tiny muted">Luxury / Restaurant / Aviation</text>
  </g>
  <g transform="translate(84 384)">
    <rect class="panel" width="330" height="114" rx="20"/>
    <text x="28" y="40" class="sans node green">Market Intelligence</text>
    <text x="28" y="70" class="mono tiny muted">Octane / PropertyLK / AutoLens</text>
    <text x="28" y="92" class="mono tiny muted">FoodLK / Ariva living signals</text>
  </g>
  <g transform="translate(806 172)">
    <rect class="panel" width="322" height="116" rx="20"/>
    <text x="28" y="42" class="sans node amber">AI + Automation</text>
    <text x="28" y="72" class="mono tiny muted">Seylan Hub / SEOS / assistants</text>
    <text x="28" y="94" class="mono tiny muted">approval flows and tool systems</text>
  </g>
  <g transform="translate(806 386)">
    <rect class="panel" width="322" height="112" rx="20"/>
    <text x="28" y="40" class="sans node rose">Developer Tools</text>
    <text x="28" y="70" class="mono tiny muted">Codex Usage Tracker</text>
    <text x="28" y="92" class="mono tiny muted">InkFlow / FullTank / demos</text>
  </g>
  <g transform="translate(430 512)">
    <rect class="panel" width="340" height="74" rx="20"/>
    <text x="44" y="32" class="sans node white">Runtime Proof</text>
    <text x="44" y="56" class="mono tiny muted">deployed URLs, checks, data freshness</text>
  </g>
  <g transform="translate(430 92)">
    <rect class="panel" width="340" height="72" rx="20"/>
    <text x="44" y="32" class="sans node white">Sri Lanka Context</text>
    <text x="44" y="56" class="mono tiny muted">fuel, property, food, vehicles, banking</text>
  </g>

  <circle cx="600" cy="310" r="6" fill="#38bdf8"/>
  <circle cx="238" cy="228" r="5" fill="#38bdf8"/>
  <circle cx="250" cy="430" r="5" fill="#34d399"/>
  <circle cx="950" cy="222" r="5" fill="#f59e0b"/>
  <circle cx="944" cy="430" r="5" fill="#fb7185"/>
</svg>
