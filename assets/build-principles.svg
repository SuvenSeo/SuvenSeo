<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Build principles</title>
  <desc id="desc">A designed panel listing Suven Seoras build principles: ship real systems, design with trust, keep data accountable, make AI controlled, and build for local context.</desc>
  <style>
    .sans { font-family: "Inter", "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", "Cascadia Mono", "Consolas", monospace; }
    .kicker { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
    .title { font-size: 42px; font-weight: 800; }
    .head { font-size: 20px; font-weight: 800; }
    .small { font-size: 14px; }
    .white { fill: #f8fafc; }
    .muted { fill: #94a3b8; }
    .blue { fill: #38bdf8; }
    .green { fill: #34d399; }
    .amber { fill: #f59e0b; }
    .rose { fill: #fb7185; }
    .panel { fill: rgba(15, 23, 42, 0.86); stroke: rgba(148, 163, 184, 0.25); stroke-width: 1; }
    .card { fill: rgba(2, 6, 23, 0.76); stroke: rgba(148, 163, 184, 0.22); stroke-width: 1; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".5" stop-color="#101827"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="rail" x1="82" y1="86" x2="1116" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset=".42" stop-color="#34d399"/>
      <stop offset=".72" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" stroke="rgba(148,163,184,0.065)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>
  <text x="76" y="62" class="mono kicker amber">BUILD STYLE / ENGINEERING TASTE</text>
  <path d="M76 88H1124" stroke="url(#rail)" stroke-width="2"/>
  <text x="76" y="136" class="sans title white">The profile should feel designed, but the work has to hold up</text>

  <g transform="translate(76 190)">
    <rect class="card" width="198" height="142" rx="18"/>
    <text x="24" y="42" class="sans head blue">Ship real</text>
    <text x="24" y="74" class="mono small muted">deployed URLs</text>
    <text x="24" y="96" class="mono small muted">browser checks</text>
    <text x="24" y="118" class="mono small muted">working demos</text>
  </g>
  <g transform="translate(292 190)">
    <rect class="card" width="198" height="142" rx="18"/>
    <text x="24" y="42" class="sans head green">Design trust</text>
    <text x="24" y="74" class="mono small muted">clear hierarchy</text>
    <text x="24" y="96" class="mono small muted">fast scanning</text>
    <text x="24" y="118" class="mono small muted">premium feel</text>
  </g>
  <g transform="translate(508 190)">
    <rect class="card" width="198" height="142" rx="18"/>
    <text x="24" y="42" class="sans head amber">Data receipts</text>
    <text x="24" y="74" class="mono small muted">sources visible</text>
    <text x="24" y="96" class="mono small muted">freshness checks</text>
    <text x="24" y="118" class="mono small muted">failure paths</text>
  </g>
  <g transform="translate(724 190)">
    <rect class="card" width="198" height="142" rx="18"/>
    <text x="24" y="42" class="sans head rose">AI control</text>
    <text x="24" y="74" class="mono small muted">approval gates</text>
    <text x="24" y="96" class="mono small muted">logs and memory</text>
    <text x="24" y="118" class="mono small muted">fallbacks</text>
  </g>
  <g transform="translate(940 190)">
    <rect class="card" width="184" height="142" rx="18"/>
    <text x="24" y="42" class="sans head white">Local wins</text>
    <text x="24" y="74" class="mono small muted">Sri Lanka</text>
    <text x="24" y="96" class="mono small muted">real markets</text>
    <text x="24" y="118" class="mono small muted">specific data</text>
  </g>
</svg>
