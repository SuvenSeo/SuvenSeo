    <circle cx="36" cy="40" r="12" fill="rgba(56,189,248,.22)" stroke="rgba(56,189,248,.75)"/>
    <path d="M30 40H42M36 34V46" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
    <text x="64" y="45" class="sans lane-title white">Ardeno Web Studio</text>
    <text x="64" y="72" class="sans body soft">Premium websites and brand-led demos that prove the studio can ship polished client work.</text>
    <g transform="translate(64 94)">
      <rect width="98" height="30" rx="10" class="chip-bg"/>
      <text x="16" y="20" class="mono chip cyan">Cafe</text>
      <rect x="110" width="108" height="30" rx="10" class="chip-bg"/>
      <text x="126" y="20" class="mono chip cyan">Fitness</text>
      <rect x="230" width="126" height="30" rx="10" class="chip-bg"/>
      <text x="246" y="20" class="mono chip cyan">Automotive</text>
      <rect x="368" width="100" height="30" rx="10" class="chip-bg"/>
      <text x="384" y="20" class="mono chip cyan">Luxury</text>
      <rect x="480" width="92" height="30" rx="10" class="chip-bg"/>
      <text x="496" y="20" class="mono chip cyan">Aviation</text>
