    <circle cx="36" cy="40" r="12" fill="rgba(52,211,153,.20)" stroke="rgba(52,211,153,.72)"/>
    <path d="M29 43L35 36L41 41L48 32" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="64" y="45" class="sans lane-title white">Market Intelligence</text>
    <text x="64" y="72" class="sans body soft">Sri Lanka-specific platforms for prices, listings, source freshness, and decision support.</text>
    <g transform="translate(64 96)">
      <rect width="96" height="30" rx="10" class="chip-bg"/>
      <text x="16" y="20" class="mono chip green">Octane</text>
      <rect x="108" width="116" height="30" rx="10" class="chip-bg"/>
      <text x="124" y="20" class="mono chip green">PropertyLK</text>
      <rect x="236" width="126" height="30" rx="10" class="chip-bg"/>
      <text x="252" y="20" class="mono chip green">AutoLens LK</text>
      <rect x="374" width="96" height="30" rx="10" class="chip-bg"/>
      <text x="390" y="20" class="mono chip green">FoodLK</text>
      <rect x="482" width="86" height="30" rx="10" class="chip-bg"/>
      <text x="498" y="20" class="mono chip green">Ariva</text>
      <rect y="42" width="104" height="30" rx="10" class="chip-bg"/>
      <text x="16" y="62" class="mono chip green">FullTank</text>
    </g>
