  <g transform="translate(82 708)">
    <rect width="1036" height="38" rx="14" fill="rgba(2,6,23,.56)" stroke="rgba(148,163,184,.16)"/>
    <text x="24" y="25" class="mono tiny muted">ARDENO STUDIO WORK AND PERSONAL PROJECTS ARE SEPARATED IN THE TABLE BELOW.</text>
    <text x="746" y="25" class="mono tiny cyan">SHIP FAST. VERIFY LIVE. KEEP RECEIPTS.</text>
