<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Suven Seoras product network</title>
  <desc id="desc">A dark visual product network map separating Ardeno Studio work from Suven Seoras personal AI, automation, security, and research projects.</desc>
  <style>
    .sans { font-family: "Inter", "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", "Cascadia Mono", "Consolas", monospace; }
    .title { font-size: 42px; font-weight: 800; letter-spacing: 0; }
    .subtitle { font-size: 16px; font-weight: 500; letter-spacing: 0; }
    .lane-title { font-size: 20px; font-weight: 800; letter-spacing: 0; }
    .body { font-size: 14px; font-weight: 500; letter-spacing: 0; }
    .tiny { font-size: 12px; font-weight: 700; letter-spacing: .6px; }
    .chip { font-size: 13px; font-weight: 700; letter-spacing: 0; }
    .white { fill: #f8fafc; }
    .muted { fill: #94a3b8; }
    .soft { fill: #cbd5e1; }
    .cyan { fill: #38bdf8; }
    .green { fill: #34d399; }
    .amber { fill: #f59e0b; }
    .rose { fill: #fb7185; }
    .panel { fill: rgba(15, 23, 42, .82); stroke: rgba(148, 163, 184, .20); stroke-width: 1; }
    .core { fill: rgba(2, 6, 23, .90); stroke: rgba(56, 189, 248, .55); stroke-width: 1.5; }
    .lane-web { fill: rgba(8, 47, 73, .50); stroke: rgba(56, 189, 248, .50); stroke-width: 1.2; }
    .lane-data { fill: rgba(6, 78, 59, .42); stroke: rgba(52, 211, 153, .48); stroke-width: 1.2; }
    .lane-ai { fill: rgba(76, 29, 149, .34); stroke: rgba(251, 113, 133, .45); stroke-width: 1.2; }
    .chip-bg { fill: rgba(15, 23, 42, .86); stroke: rgba(148, 163, 184, .20); stroke-width: 1; }
    .line { stroke: rgba(203, 213, 225, .40); stroke-width: 2; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".45" stop-color="#07111f"/>
      <stop offset=".75" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1020"/>
    </linearGradient>
    <linearGradient id="rail" x1="86" y1="105" x2="1118" y2="668" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset=".50" stop-color="#34d399"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 162) rotate(44) scale(290 220)">
      <stop stop-color="#38bdf8" stop-opacity=".22"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(945 594) rotate(40) scale(360 250)">
      <stop stop-color="#fb7185" stop-opacity=".16"/>
      <stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="rgba(148,163,184,.075)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="rgba(203, 213, 225, .72)"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="760" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="760" rx="28" fill="url(#glowA)"/>
  <rect width="1200" height="760" rx="28" fill="url(#glowB)"/>
  <rect x="36" y="36" width="1128" height="688" rx="26" class="panel"/>
  <path d="M628 116H1122" stroke="url(#rail)" stroke-width="2.5" opacity=".82"/>

  <g transform="translate(78 64)">
    <text x="0" y="0" dominant-baseline="hanging" class="mono tiny cyan">PRODUCT NETWORK</text>
    <text x="0" y="28" dominant-baseline="hanging" class="sans title white">Suven product network</text>
    <text x="0" y="82" dominant-baseline="hanging" class="sans subtitle muted">Ardeno Studio work on one side, personal AI and automation projects on the other.</text>
  </g>

