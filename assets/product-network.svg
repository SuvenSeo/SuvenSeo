    <text x="30" y="42" class="mono tiny cyan">PROFILE</text>
    <text x="30" y="82" class="sans title white" style="font-size:34px">Suven</text>
    <text x="30" y="121" class="sans title white" style="font-size:34px">Seoras</text>
    <text x="30" y="166" class="sans body soft">Co-founder at Ardeno Studio,</text>
    <text x="30" y="190" class="sans body soft">with separate personal labs for</text>
    <text x="30" y="214" class="sans body soft">AI, automation, and research.</text>

    <g transform="translate(30 260)">
      <rect width="112" height="48" rx="14" fill="rgba(56,189,248,.13)" stroke="rgba(56,189,248,.38)"/>
      <text x="18" y="30" class="mono chip cyan">ARDENO</text>
      <rect x="128" width="112" height="48" rx="14" fill="rgba(52,211,153,.13)" stroke="rgba(52,211,153,.36)"/>
      <text x="146" y="30" class="mono chip green">MARKET</text>
      <rect y="64" width="112" height="48" rx="14" fill="rgba(245,158,11,.13)" stroke="rgba(245,158,11,.38)"/>
      <text x="18" y="94" class="mono chip amber">PERSONAL</text>
      <rect x="128" y="64" width="112" height="48" rx="14" fill="rgba(251,113,133,.13)" stroke="rgba(251,113,133,.36)"/>
      <text x="146" y="94" class="mono chip rose">LABS</text>
    </g>

    <text x="30" y="406" class="mono tiny muted">PUBLIC PORTFOLIO, SPLIT BY CONTEXT</text>
  </g>

  <path d="M372 254C432 254 444 218 492 218" class="line" marker-end="url(#arrow)"/>
  <path d="M372 396C426 396 444 396 492 396" class="line" marker-end="url(#arrow)"/>
  <path d="M372 524C432 524 446 574 492 574" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(492 162)">
