  <g transform="translate(492 520)">
    <rect width="636" height="176" rx="22" class="lane-ai"/>
    <circle cx="36" cy="40" r="12" fill="rgba(251,113,133,.18)" stroke="rgba(251,113,133,.72)"/>
    <path d="M31 40H41M36 35V45M45 35L49 31M45 45L49 49M27 35L23 31M27 45L23 49" stroke="#fb7185" stroke-width="2" stroke-linecap="round"/>
    <text x="64" y="45" class="sans lane-title white">Personal Labs + Tooling</text>
    <text x="64" y="72" class="sans body soft">Personal AI, automation, security tooling, local analytics, research, and app experiments.</text>
    <g transform="translate(64 96)">
      <rect width="76" height="30" rx="10" class="chip-bg"/>
      <text x="16" y="20" class="mono chip rose">SEOS</text>
      <rect x="88" width="132" height="30" rx="10" class="chip-bg"/>
      <text x="104" y="20" class="mono chip rose">AgentGuard</text>
      <rect x="232" width="156" height="30" rx="10" class="chip-bg"/>
      <text x="248" y="20" class="mono chip rose">Secure Review</text>
      <rect x="400" width="104" height="30" rx="10" class="chip-bg"/>
      <text x="416" y="20" class="mono chip rose">Codex</text>
      <rect y="42" width="120" height="30" rx="10" class="chip-bg"/>
      <text x="16" y="62" class="mono chip rose">Fraud Lab</text>
      <rect x="132" y="42" width="128" height="30" rx="10" class="chip-bg"/>
      <text x="148" y="62" class="mono chip rose">SprintForm</text>
      <rect x="272" y="42" width="124" height="30" rx="10" class="chip-bg"/>
      <text x="288" y="62" class="mono chip rose">NLP Bench</text>
      <rect x="408" y="42" width="110" height="30" rx="10" class="chip-bg"/>
      <text x="424" y="62" class="mono chip rose">Ride Pilot</text>
