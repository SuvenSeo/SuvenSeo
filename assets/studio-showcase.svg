<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ardeno Studio showcase</title>
  <desc id="desc">A designed panel showing Ardeno Studio website demos across cafe, fitness, automotive, luxury, restaurant, and private aviation categories.</desc>
  <style>
    .sans { font-family: "Inter", "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", "Cascadia Mono", "Consolas", monospace; }
    .kicker { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
    .title { font-size: 44px; font-weight: 800; }
    .copy { font-size: 18px; }
    .small { font-size: 14px; }
    .card-title { font-size: 20px; font-weight: 800; }
    .white { fill: #f8fafc; }
    .muted { fill: #94a3b8; }
    .blue { fill: #38bdf8; }
    .green { fill: #34d399; }
    .amber { fill: #f59e0b; }
    .rose { fill: #fb7185; }
    .panel { fill: rgba(15, 23, 42, 0.86); stroke: rgba(148, 163, 184, 0.26); stroke-width: 1; }
    .card { fill: rgba(2, 6, 23, 0.78); stroke: rgba(148, 163, 184, 0.22); stroke-width: 1; }
    .line { stroke: rgba(56, 189, 248, 0.38); stroke-width: 1; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".5" stop-color="#101827"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="bar" x1="84" y1="82" x2="1118" y2="484" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset=".45" stop-color="#34d399"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="rgba(148,163,184,0.07)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="560" rx="30" fill="url(#grid)"/>
  <path d="M72 86H1128" stroke="url(#bar)" stroke-width="2"/>
  <text x="76" y="62" class="mono kicker blue">ARDENO STUDIO / WEB AGENCY</text>
  <text x="76" y="132" class="sans title white">Client-ready websites with product-level execution</text>
  <text x="78" y="168" class="sans copy muted">Premium demos, fast deployments, and business-facing web systems built to look credible from the first screen.</text>

  <g transform="translate(76 216)">
    <rect class="card" width="318" height="118" rx="18"/>
    <circle cx="34" cy="34" r="12" fill="#38bdf8"/>
    <text x="60" y="42" class="sans card-title white">Cinnamon Cafe</text>
    <text x="28" y="74" class="sans small muted">Hospitality site for cafe, tea, and</text>
    <text x="28" y="96" class="sans small muted">specialty coffee positioning.</text>
  </g>
  <g transform="translate(441 216)">
    <rect class="card" width="318" height="118" rx="18"/>
    <circle cx="34" cy="34" r="12" fill="#34d399"/>
    <text x="60" y="42" class="sans card-title white">Lanka Fitness</text>
    <text x="28" y="74" class="sans small muted">Fitness brand website with strong</text>
    <text x="28" y="96" class="sans small muted">conversion and local credibility.</text>
  </g>
  <g transform="translate(806 216)">
    <rect class="card" width="318" height="118" rx="18"/>
    <circle cx="34" cy="34" r="12" fill="#f59e0b"/>
    <text x="60" y="42" class="sans card-title white">Lanka Motion</text>
    <text x="28" y="74" class="sans small muted">Automotive and motion brand demo</text>
    <text x="28" y="96" class="sans small muted">with speed-focused presentation.</text>
  </g>
  <g transform="translate(76 370)">
    <rect class="card" width="318" height="118" rx="18"/>
    <circle cx="34" cy="34" r="12" fill="#fb7185"/>
    <text x="60" y="42" class="sans card-title white">Luxe Lanka</text>
    <text x="28" y="74" class="sans small muted">Luxury beauty website demo with</text>
    <text x="28" y="96" class="sans small muted">premium service storytelling.</text>
  </g>
  <g transform="translate(441 370)">
    <rect class="card" width="318" height="118" rx="18"/>
    <circle cx="34" cy="34" r="12" fill="#38bdf8"/>
    <text x="60" y="42" class="sans card-title white">Urban Kitchen</text>
    <text x="28" y="74" class="sans small muted">Restaurant site demo for menu,</text>
    <text x="28" y="96" class="sans small muted">atmosphere, and bookings.</text>
  </g>
  <g transform="translate(806 370)">
    <rect class="card" width="318" height="118" rx="18"/>
    <circle cx="34" cy="34" r="12" fill="#34d399"/>
    <text x="60" y="42" class="sans card-title white">Global Jet Concierge</text>
    <text x="28" y="74" class="sans small muted">Private aviation demo with polished</text>
    <text x="28" y="96" class="sans small muted">luxury-service positioning.</text>
  </g>

  <path d="M235 334V370" class="line"/>
  <path d="M600 334V370" class="line"/>
  <path d="M965 334V370" class="line"/>
</svg>
